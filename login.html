<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <style>
    
body {
  font-family: Arial;
  height: 100vh;
  margin: 0;

  /* 🔥 E-commerce style background */
  background: linear-gradient(135deg, #1f1c2c, #928dab);

  display: flex;
  justify-content: center;
  align-items: center;
}

.box {
  background: white;
  padding: 30px;
  border-radius: 12px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  width: 320px;
}

h2 {
  text-align: center;
  margin-bottom: 20px;
  color: #333;
}

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border: 1px solid #ccc;
  border-radius: 6px;
}

button {
  width: 100%;
  padding: 12px;
  background: #ff3f6c;  /* e-commerce pink/red */
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
}

button:hover {
  background: #e6325c;
}
  </style>
</head>

<body>

<div class="box">
  <h2>Login</h2>

  <input type="text" id="user" placeholder="Username">
  <input type="password" id="pass" placeholder="Password">

  <button onclick="login()">Login</button>
</div>
<script>
function login() {
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if (u !== "" && p !== "") {
    localStorage.setItem("loggedIn", "true");
    localStorage.setItem("username", u);
    window.location.href = "index.html";
  } else {
    alert("Please enter username and password");
  }
}
</script>
</body>
</html>
